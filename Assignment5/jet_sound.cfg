% SU2 configuration file for 2D Axisymmetric Turbulent Jet
% Speed of Sound Volume and Screen Output (Assignment 5)
% -----------------------------------------------------------------------------%
% SOLVER DEFINITION
% -----------------------------------------------------------------------------%
SOLVER= RANS
KIND_TURB_MODEL= SST
MATH_PROBLEM= DIRECT
RESTART_SOL= NO
AXISYMMETRIC= YES

% -----------------------------------------------------------------------------%
% GAS MODEL AND REFERENCE STATE
% -----------------------------------------------------------------------------%
FLUID_MODEL= STANDARD_AIR
MACH_NUMBER= 0.01
FREESTREAM_OPTION= TEMPERATURE_FS
FREESTREAM_TEMPERATURE= 300.0
FREESTREAM_PRESSURE= 101325.0
REYNOLDS_NUMBER= 1000000.0
REYNOLDS_LENGTH= 1.0
REF_DIMENSIONALIZATION= DIMENSIONAL

% -----------------------------------------------------------------------------%
% VISCOSITY AND THERMAL CONDUCTIVITY
% -----------------------------------------------------------------------------%
VISCOSITY_MODEL= SUTHERLAND
MU_CONSTANT= 1.716E-5
MU_REF= 1.716E-5
MU_T_REF= 273.15
SUTHERLAND_CONSTANT= 110.4

CONDUCTIVITY_MODEL= CONSTANT_PRANDTL
PRANDTL_LAM= 0.72
PRANDTL_TURB= 0.90

% -----------------------------------------------------------------------------%
% BOUNDARY CONDITIONS
% -----------------------------------------------------------------------------%
% Symmetry axis (y=0)
MARKER_SYM= ( SYMMETRY )

% Jet inlet: total P/T (pt = 105000 Pa, Tt = 300 K)
% Coflow inlet: total P/T (pt = 101400 Pa, Tt = 300 K)
MARKER_RIEMANN= ( INLET_JET, TOTAL_CONDITIONS_PT, 105000.0, 300.0, 1.0, 0.0, 0.0, INLET_COFLOW, TOTAL_CONDITIONS_PT, 101400.0, 300.0, 1.0, 0.0, 0.0 )

% Farfield and Outlet
MARKER_FAR= ( FARFIELD, 0.01, 101325.0, 300.0, 1.0, 0.0, 0.0 )
MARKER_EULER= ( OUTLET )

% Markers for surface analysis (to get per-surface sound speed)
MARKER_ANALYZE= ( INLET_JET, OUTLET )
MARKER_ANALYZE_AVERAGE= AREA

% -----------------------------------------------------------------------------%
% NUMERICAL METHOD
% -----------------------------------------------------------------------------%
NUM_METHOD_GRAD= GREEN_GAUSS
CFL_NUMBER= 50.0
CFL_ADAPT= NO
MAX_DELTA_TIME= 1E6
MUSCL_FLOW= YES
SLOPE_LIMITER_FLOW= VENKATAKRISHNAN
VENKAT_LIMITER_COEFF= 0.05

% Linear solver
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= ILU
LINEAR_SOLVER_ILU_FILL_IN= 0
LINEAR_SOLVER_ERROR= 0.01
LINEAR_SOLVER_ITER= 10

% Flow and Turbulence Equations
CONV_NUM_METHOD_FLOW= ROE
ENTROPY_FIX_COEFF= 0.1
TIME_DISCRE_FLOW= EULER_IMPLICIT
CONV_NUM_METHOD_TURB= SCALAR_UPWIND
TIME_DISCRE_TURB= EULER_IMPLICIT

% -----------------------------------------------------------------------------%
% CONVERGENCE AND OUTPUT PARAMETERS
% -----------------------------------------------------------------------------%
ITER= 500
CONV_RESIDUAL_MINVAL= -8

MESH_FILENAME= jet.su2
SOLUTION_FILENAME= solution_flow.dat
RESTART_FILENAME= restart_flow.dat
TABULAR_FORMAT= CSV
CONV_FILENAME= history

%
% Volume output: PRIMITIVE group includes Sound_Speed field
%
OUTPUT_FILES= (RESTART, PARAVIEW, SURFACE_PARAVIEW)
VOLUME_OUTPUT= (COORDINATES, SOLUTION, PRIMITIVE)

%
% Screen output: SOUND_SPEED shows the domain-averaged speed of sound
% SURFACE_SOUND_SPEED shows per-surface avg on MARKER_ANALYZE markers
%
SCREEN_OUTPUT= (INNER_ITER, RMS_DENSITY, RMS_TKE, RMS_DISSIPATION, SOUND_SPEED, SURFACE_SOUND_SPEED)
HISTORY_OUTPUT= (ITER, RMS_RES, FLOW_COEFF, FLOW_COEFF_SURF)

OUTPUT_WRT_FREQ= 100